<!DOCTYPE html>
<html>
<head>
<title>
Exercises
</title>
</head>
<body>
  <div id="root">
    <p style="padding:20px;font-family:sans-serif">Loading... if you see this, and it doesn't get replaced ...  then React never mounted</p>
  </div>

  <script>
    window.addEventListener('error', function(e) {
      document.getElementById('root').innerHTML =
        '<pre style="padding:20px;color:red;white-space:pre-wrap">' +
        'JS ERROR:\n' + e.message + '\n' + e.filename + ':' + e.lineno +
        '</pre>';
    });
    window.addEventListener('unhandledrejection', function(e) {
      document.getElementById('root').innerHTML =
        '<pre style="padding:20px;color:red;white-space:pre-wrap">' +
        'UNHANDLED PROMISE REJECTION:\n' + e.reason +
        '</pre>';
    });
  </script>

  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
