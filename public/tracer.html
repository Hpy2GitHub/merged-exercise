<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Muscle Data Editor - Dual View</title>
      <style>
         * {
         margin: 0;
         padding: 0;
         box-sizing: border-box;
         }
         body {
         font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f5f5f5;
         height: 100vh;
         display: flex;
         flex-direction: column;
         }
         .header {
         background: white;
         padding: 20px;
         border-bottom: 1px solid #ddd;
         }
         .header h1 {
         font-size: 24px;
         color: #333;
         }
         .container {
         display: flex;
         flex: 1;
         overflow: hidden;
         }
         /* Sidebar Styling - 3 column layout */
        .sidebar-left {
            width: 350px;
            background: white;
            border-right: 1px solid #ddd;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .sidebar-right {
            width: 350px;
            background: white;
            border-left: 1px solid #ddd;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
         .section {
         border-bottom: 1px solid #eee;
         padding-bottom: 20px;
         }
         .section:last-child { border-bottom: none; }
         label {
         display: block;
         font-weight: 600;
         margin-bottom: 8px;
         font-size: 14px;
         }
         /* Buttons */
         button {
         width: 100%;
         padding: 10px;
         border: none;
         border-radius: 4px;
         font-size: 14px;
         cursor: pointer;
         font-weight: 600;
         margin-top: 8px;
         transition: background 0.2s;
         }
         .btn-primary { background: #2563eb; color: white; }
         .btn-primary:hover { background: #1d4ed8; }
         .btn-secondary { background: #e5e7eb; color: #374151; }
         .btn-secondary:hover { background: #d1d5db; }
         .btn-success { background: #16a34a; color: white; }
         .btn-success:hover { background: #15803d; }
         .btn-purple { background: #9333ea; color: white; }
         .btn-danger { background: #dc2626; color: white; }
         .view-buttons { display: flex; gap: 8px; }
         .view-buttons button { margin-top: 0; flex: 1; }
         /* File Input */
         .file-input-label {
         display: block;
         padding: 12px;
         background: #f3f4f6;
         border: 2px dashed #d1d5db;
         border-radius: 6px;
         text-align: center;
         cursor: pointer;
         color: #4b5563;
         }
         .file-input-label:hover { background: #e5e7eb; border-color: #9ca3af; }
         input[type="file"] { display: none; }
         /* Radio Grid for Muscles */
         .radio-grid {
         display: grid;
         grid-template-columns: 1fr 1fr;
         gap: 8px;
         max-height: 250px;
         overflow-y: auto;
         border: 1px solid #e5e7eb;
         padding: 10px;
         border-radius: 4px;
         background: #f9fafb;
         }
         .radio-item {
         display: flex;
         align-items: center;
         font-size: 13px;
         font-weight: normal;
         margin: 0;
         cursor: pointer;
         }
         .radio-item input { margin-right: 6px; }
         /* Muscle List */
         .muscle-list {
         max-height: 300px;
         overflow-y: auto;
         }
         .muscle-item {
         padding: 10px;
         background: #f9fafb;
         border: 1px solid #e5e7eb;
         border-radius: 4px;
         margin-bottom: 8px;
         cursor: pointer;
         }
         .muscle-item:hover { background: #f3f4f6; }
         .muscle-item.selected {
         background: #dbeafe;
         border-color: #2563eb;
         }
         .muscle-header {
         display: flex;
         justify-content: space-between;
         align-items: center;
         }
         .color-preview {
         width: 16px;
         height: 16px;
         border-radius: 3px;
         display: inline-block;
         margin-right: 8px;
         vertical-align: middle;
         }
         /* View Indicator */
         .view-indicator {
         font-size: 10px;
         color: #666;
         background: #f0f0f0;
         padding: 1px 6px;
         border-radius: 10px;
         margin-left: 8px;
         font-weight: normal;
         }
         .view-indicator.front { background: #dbeafe; color: #1e40af; }
         .view-indicator.back { background: #fef3c7; color: #92400e; }
         /* Main Canvas Area */
         .main {
         flex: 1;
         padding: 30px;
         overflow: auto;
         background: #e5e5e5;
         display: flex;
         align-items: flex-start;
         justify-content: center;
         }
         .canvas-container {
         display: flex;
         gap: 20px;
         background: white;
         padding: 20px;
         border-radius: 8px;
         box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
         }
         .canvas-wrapper {
         text-align: center;
         }
         .canvas-wrapper h3 {
         margin-bottom: 10px;
         color: #4b5563;
         font-size: 16px;
         }
         canvas {
         border: 1px solid #ddd;
         background: white;
         max-width: 400px;
         height: auto;
         cursor: crosshair;
         }
         /* Utilities */
         .empty-state {
         text-align: center;
         color: #6b7280;
         margin-top: 100px;
         }
         .edit-panel {
         background: #eff6ff;
         padding: 15px;
         border-radius: 6px;
         border: 1px solid #bfdbfe;
         margin-bottom: 20px;
         }
         input[type="color"] {
         width: 100%;
         height: 35px;
         padding: 2px;
         border: 1px solid #ddd;
         border-radius: 4px;
         }
         .info-box {
         background: #dbeafe;
         padding: 10px;
         border-radius: 4px;
         font-size: 12px;
         color: #1e40af;
         }
      </style>
   </head>
   <body>
      <div class="header">
         <h1>Muscle Data Editor</h1>
      </div>
      <div class="container">
         <div class="sidebar-left">
            <div class="section">
                  <label>1. Load Data</label>
                  <label for="jsonUpload" class="file-input-label">Select JSON File</label>
                  <input type="file" id="jsonUpload" accept=".json" onchange="handleJSONUpload(event)">
               </div>
               <div id="editSection" class="edit-panel" style="display: block;">
                  <label style="color: #1e40af;">Editing Selected Muscle</label>
                  <div class="info-box" style="margin-bottom: 10px;">
                     Click on regions in the image to add them to this muscle group
                  </div>
                  <label>2. Muscle Group</label>
                  <div id="muscleRadios" class="radio-grid">
                  </div>
                  <label style="margin-top: 10px;">Color</label>
                  <input type="color" id="editColor" value="#ff0000">
                  <div style="display: flex; gap: 10px; margin-top: 10px;">
                     <button class="btn-success" onclick="saveEdit()">Save Changes</button>
                     <button class="btn-secondary" onclick="cancelEdit()">Cancel</button>
                  </div>
               </div>
            </div>
            <div class="sidebar-right">
            <div class="section">
                  <label>Muscle List View</label>
                  <div class="view-buttons">
                     <button class="btn-secondary" id="btn-front" onclick="switchListView('front')">Front Only</button>
                     <button class="btn-secondary" id="btn-back" onclick="switchListView('back')">Back Only</button>
                     <button class="btn-primary" id="btn-combined" onclick="switchListView('combined')">All Muscles</button>
                  </div>
               </div>
               <div class="section" style="flex: 1; overflow: hidden; display: flex; flex-direction: column;">
                  <label>Muscles (<span id="muscleCount">0</span>)</label>
                  <div class="muscle-list" id="muscleList">
                  </div>
               </div>
               <button class="btn-purple" id="exportBtn" onclick="exportData()" style="display: none;">Export Updated JSON</button>
            </div>
      <div class="main">
         <div id="emptyState" class="empty-state">
            <h2>Loading images…</h2>
            <p>If this persists, check that images/muscles/front.png and back.png exist.</p>
         </div>
         <div id="dualViewContainer" class="canvas-container" style="display: none;">
            <div class="canvas-wrapper">
               <h3>Front View</h3>
               <canvas id="canvas-front"></canvas>
            </div>
            <div class="canvas-wrapper">
               <h3>Back View</h3>
               <canvas id="canvas-back"></canvas>
            </div>
         </div>
      </div>
      </div>
      </div>
      <script>
         // CONFIGURATION - UPDATED with all muscle groups including feet
         const muscleNames = [
             'abductors', 'abs', 'adductors', 'back', 'biceps', 'calves', 
             'chest', 'feet', 'forearms', 'glutes', 'hamstrings', 'lowerback', 
             'neck', 'quads', 'shoulders', 'trapezius', 'triceps'
         ];
         
         const frontOnlyMuscleNames = [
             'abs', 'adductors', 'biceps', 'chest', 'neck', 'quads'
         ];
         
         const backOnlyMuscleNames = [
             'glutes', 'hamstrings', 'lowerback', 'triceps'
         ];
         
         const bothMuscleNames = [
             'abductors', 'back', 'calves', 'feet', 'forearms', 'shoulders', 'trapezius' 
         ];
         
         // STATE
         let activeListView = 'combined'; // 'front', 'back', or 'combined'
         let images = { front: null, back: null };
         let muscles = { front: [], back: [] };
         let processedData = { front: null, back: null };
         let selectedMuscle = null;
         let dataLoaded = false;
         let selectedRegionIndices = [];
         
         // --- INITIALIZATION ---
         
         function init() {
             updateRadioButtons();
         }
         
         function updateRadioButtons() {
             const container = document.getElementById('muscleRadios');
             let muscleList = [];
             
             if (activeListView === 'front') {
                 // Front view: show front-only and both muscles
                 muscleList = [...frontOnlyMuscleNames, ...bothMuscleNames].sort();
                 container.innerHTML = muscleList.map(name => `
                     <label class="radio-item">
                         <input type="radio" name="muscle_selector" value="${name}" data-view="front" onChange="handleRadioChange();">
                         ${name}
                     </label>
                 `).join('');
             } else if (activeListView === 'back') {
                 // Back view: show back-only and both muscles
                 muscleList = [...backOnlyMuscleNames, ...bothMuscleNames].sort();
                 container.innerHTML = muscleList.map(name => `
                     <label class="radio-item">
                         <input type="radio" name="muscle_selector" value="${name}" data-view="back" onChange="handleRadioChange();">
                         ${name}
                     </label>
                 `).join('');
             } else {
                 // Combined view: show all muscles with view labels
                 const frontMuscles = [...frontOnlyMuscleNames, ...bothMuscleNames].sort();
                 const backMuscles = [...backOnlyMuscleNames, ...bothMuscleNames].sort();
                 
                 container.innerHTML = [
                     ...frontMuscles.map(name => `
                         <label class="radio-item">
                             <input type="radio" name="muscle_selector" value="${name}" data-view="front" onChange="handleRadioChange();">
                             ${name} <span style="color:#1e40af; font-size:10px;">(front)</span>
                         </label>
                     `),
                     ...backMuscles.map(name => `
                         <label class="radio-item">
                             <input type="radio" name="muscle_selector" value="${name}" data-view="back" onChange="handleRadioChange();">
                             ${name} <span style="color:#92400e; font-size:10px;">(back)</span>
                         </label>
                     `)
                 ].join('');
             }
         }
         
         init();

         // --- UTILITY FUNCTIONS ---
         
         function getCombinedMuscles() {
             const combined = [];
             
             // Add front muscles with view marker
             muscles.front.forEach((muscle, index) => {
                 combined.push({
                     ...muscle,
                     view: 'front',
                     originalIndex: index,
                     displayName: muscle.name || 'Unnamed'
                 });
             });
             
             // Add back muscles with view marker
             muscles.back.forEach((muscle, index) => {
                 combined.push({
                     ...muscle,
                     view: 'back',
                     originalIndex: index,
                     displayName: muscle.name || 'Unnamed'
                 });
             });
             
             // Sort alphabetically by name
             combined.sort((a, b) => {
                 const nameA = a.displayName.toLowerCase();
                 const nameB = b.displayName.toLowerCase();
                 if (nameA < nameB) return -1;
                 if (nameA > nameB) return 1;
                 
                 // If same name, sort by view (front first)
                 if (a.view === 'front' && b.view === 'back') return -1;
                 if (a.view === 'back' && b.view === 'front') return 1;
                 
                 return 0;
             });
             
             return combined;
         }
         
         function findMuscleInCombinedList(view, originalIndex) {
             const combinedList = getCombinedMuscles();
             return combinedList.findIndex(m => 
                 m.view === view && m.originalIndex === originalIndex
             );
         }
         
         function handleRadioChange() {
             console.log('=== handleRadioChange called ===');

             // Get the selected radio button
             const radio = document.querySelector('input[name="muscle_selector"]:checked');
             if (!radio) {
                 console.log('No radio button checked');
                 return;
             }

             const selectedName = radio.value;
             const targetView = radio.getAttribute('data-view');
             console.log('Selected muscle name:', selectedName, 'for view:', targetView);
             
             // Try to find existing muscle in the target view
             const index = muscles[targetView].findIndex(m => m.name === selectedName);
             
             if (index !== -1) {
                 // Muscle exists - select it
                 console.log('Found existing muscle at index:', index, 'in', targetView);
                 selectMuscle(targetView, index);
             } else {
                 // Muscle doesn't exist - create a new one
                 console.log('Creating new muscle:', selectedName, 'in', targetView);
                 
                 const newMuscle = {
                     name: selectedName,
                     color: document.getElementById('editColor').value,
                     regions: []
                 };
                 
                 muscles[targetView].push(newMuscle);
                 const newIndex = muscles[targetView].length - 1;
                 
                 // Select the newly created muscle
                 selectMuscle(targetView, newIndex);
                 
                 // Update the list to show the new muscle
                 updateListUI();
             }
         }
         
         // --- CORE FUNCTIONS ---
         
         // Auto-run on page load: show images with empty muscle data
         async function autoInit() {
             try {
                 await Promise.all([
                     loadImage('front', 'images/muscles/front.png'),
                     loadImage('back', 'images/muscles/back.png')
                 ]);
                 await Promise.all([
                     processView('front', 80),
                     processView('back', 80)
                 ]);
                 document.getElementById('emptyState').style.display = 'none';
                 document.getElementById('dualViewContainer').style.display = 'flex';
                 document.getElementById('exportBtn').style.display = 'block';
                 dataLoaded = true;
                 updateListUI();
             } catch (error) {
                 console.error('Auto-init failed:', error);
                 document.getElementById('emptyState').innerHTML =
                     '<h2>Image load failed</h2><p>Check that images/muscles/front.png and back.png exist.</p>';
             }
         }

         async function handleJSONUpload(e) {
             const file = e.target.files[0];
             if (!file) return;
         
             try {
                 const text = await file.text();
                 const data = JSON.parse(text);
                 
                 // Merge JSON into muscle state
                 muscles.front = data.front || [];
                 muscles.back = data.back || [];

                 // Images may already be loaded by autoInit; if not, load now
                 if (!dataLoaded) {
                     await Promise.all([
                         loadImage('front', 'images/muscles/front.png'),
                         loadImage('back', 'images/muscles/back.png')
                     ]);
                     await Promise.all([
                         processView('front', 80),
                         processView('back', 80)
                     ]);
                     document.getElementById('emptyState').style.display = 'none';
                     document.getElementById('dualViewContainer').style.display = 'flex';
                     document.getElementById('exportBtn').style.display = 'block';
                     dataLoaded = true;
                 }

                 updateListUI();
                 drawCanvas('front');
                 drawCanvas('back');
                 
                 console.log("Front muscles:", muscles.front.length);
                 console.log("Back muscles:", muscles.back.length);
             } catch (error) {
                 console.error(error);
                 alert("Error loading JSON. Check console for details.");
             }
         }
         
         function loadImage(view, src) {
             return new Promise((resolve, reject) => {
                 const img = new Image();
                 img.onload = () => {
                     images[view] = img;
                     resolve();
                 };
                 img.onerror = () => reject(`Failed to load ${src}`);
                 img.src = src;
             });
         }
         
         // --- IMAGE PROCESSING ---
         
         async function processView(view, threshold) {
             const img = images[view];
             if (!img) return;
         
             // 1. Create a temp canvas to read pixel data
             const tempCanvas = document.createElement('canvas');
             const ctx = tempCanvas.getContext('2d');
             
             // FIXED: Use original image dimensions - no resizing!
             tempCanvas.width = img.width;
             tempCanvas.height = img.height;
             ctx.drawImage(img, 0, 0);
             
             const imageData = ctx.getImageData(0, 0, img.width, img.height);
             
             // 2. Run detection to find clickable regions
             const regions = detectRegions(imageData, threshold);
             
             processedData[view] = {
                 regions: regions,
                 width: img.width,
                 height: img.height
             };
         
             console.log(`Detected ${regions.length} regions in ${view} view`);
             
             // 3. Initial Draw
             drawCanvas(view);
         }
         
         function detectRegions(imageData, threshold) {
             const width = imageData.width;
             const height = imageData.height;
             const data = imageData.data;
             
             // Create edge map
             const edges = new Uint8Array(width * height);
             for (let y = 1; y < height - 1; y++) {
                 for (let x = 1; x < width - 1; x++) {
                     const idx = (y * width + x) * 4;
                     const brightness = (data[idx] + data[idx + 1] + data[idx + 2]) / 3;
                     
                     if (brightness < threshold) {
                         edges[y * width + x] = 1;
                     }
                 }
             }
         
             // Flood fill to find regions
             const visited = new Uint8Array(width * height);
             const regions = [];
             
             for (let y = 0; y < height; y++) {
                 for (let x = 0; x < width; x++) {
                     const idx = y * width + x;
                     if (!visited[idx] && !edges[idx]) {
                         const region = floodFill(x, y, width, height, edges, visited);
                         if (region.length > 100) { // Only keep regions with substantial size
                             regions.push(region);
                         }
                     }
                 }
             }
         
             console.log(`Found ${regions.length} regions`);
             return regions;
         }
         
         function floodFill(startX, startY, width, height, edges, visited) {
             const region = [];
             const stack = [{x: startX, y: startY}];
             
             while (stack.length > 0 && region.length < 50000) {
                 const {x, y} = stack.pop();
                 
                 if (x < 0 || x >= width || y < 0 || y >= height) continue;
                 
                 const idx = y * width + x;
                 if (visited[idx] || edges[idx]) continue;
                 
                 visited[idx] = 1;
                 region.push({x, y});
                 
                 // Add neighbors
                 stack.push({x: x + 1, y});
                 stack.push({x: x - 1, y});
                 stack.push({x, y: y + 1});
                 stack.push({x, y: y - 1});
             }
             
             return region;
         }
         
         // --- DRAWING ---
         function drawCanvas(view) {
             const canvas = document.getElementById(`canvas-${view}`);
             const img = images[view];
             if (!img) return;
             
             const ctx = canvas.getContext('2d');
             
             // Display size (max 400px width via CSS, but canvas resolution matches image aspect)
             canvas.width = img.width;
             canvas.height = img.height;
             
             // 1. Draw Image
             ctx.clearRect(0, 0, canvas.width, canvas.height);
             ctx.drawImage(img, 0, 0);
             
             // 2. Draw saved muscles from JSON
             const viewMuscles = muscles[view];
             if (!viewMuscles) return;
             
             viewMuscles.forEach((muscle, index) => {
                 const isSelected = (selectedMuscle && selectedMuscle.view === view && selectedMuscle.index === index);
                 
                 // Color logic: Highlight if selected, otherwise dimmer
                 const baseColor = muscle.color || '#ff0000';
                 ctx.fillStyle = baseColor + (isSelected ? 'CC' : '50'); // Hex alpha: CC=80%, 50=30%
                 
                 // Draw all pixels in the region
                 if (muscle.regions) {
                     muscle.regions.forEach((region) => {
                         if (Array.isArray(region)) {
                             region.forEach(pt => {
                                 if (pt && pt.x !== undefined && pt.y !== undefined) {
                                     ctx.fillRect(pt.x, pt.y, 1, 1);
                                 }
                             });
                         }
                     });
                 }
             });
             
             // 3. Draw newly selected regions (during editing) - only on the canvas being edited
             if (selectedMuscle && selectedMuscle.view === view && selectedRegionIndices.length > 0 && processedData[view]) {
                 const editColor = document.getElementById('editColor').value;
                 ctx.fillStyle = editColor + 'AA'; // Brighter for newly selected regions
                 
                 selectedRegionIndices.forEach(regionIdx => {
                     const region = processedData[view].regions[regionIdx];
                     if (region && Array.isArray(region)) {
                         region.forEach(pt => {
                             if (pt && pt.x !== undefined && pt.y !== undefined) {
                                 ctx.fillRect(pt.x, pt.y, 1, 1);
                             }
                         });
                     }
                 });
             }
         }
         
         // --- UI INTERACTION ---
         
         function switchListView(view) {
             activeListView = view;
             selectedMuscle = null; // Deselect when switching views
             selectedRegionIndices = [];
             
             // Update Tab Buttons
             document.getElementById('btn-front').className = view === 'front' ? 'btn-primary' : 'btn-secondary';
             document.getElementById('btn-back').className = view === 'back' ? 'btn-primary' : 'btn-secondary';
             document.getElementById('btn-combined').className = view === 'combined' ? 'btn-primary' : 'btn-secondary';
             
             // Update radio buttons for the new view
             updateRadioButtons();
             
             updateListUI();
             
             // Redraw both to clear highlights
             drawCanvas('front');
             drawCanvas('back');
         }
         
         function updateListUI() {
             const listEl = document.getElementById('muscleList');
             let currentList;
             let totalCount;
             
             if (activeListView === 'combined') {
                 const combined = getCombinedMuscles();
                 currentList = combined;
                 totalCount = muscles.front.length + muscles.back.length;
             } else {
                 currentList = muscles[activeListView];
                 totalCount = currentList.length;
             }
             
             document.getElementById('muscleCount').textContent = totalCount;
         
             if (totalCount === 0) {
                 listEl.innerHTML = '<div style="padding:20px; text-align:center; color:#999">No muscles found</div>';
                 return;
             }
             
             listEl.innerHTML = currentList.map((muscle, i) => {
                 let isSelected = false;
                 
                 if (activeListView === 'combined') {
                     // For combined view, check if this muscle matches the selected one
                     isSelected = selectedMuscle && 
                                 selectedMuscle.view === muscle.view && 
                                 selectedMuscle.index === muscle.originalIndex;
                 } else {
                     // For single views
                     isSelected = selectedMuscle && 
                                 selectedMuscle.view === activeListView && 
                                 selectedMuscle.index === i;
                 }
                 
                 // Create view indicator for combined view
                 const viewIndicator = activeListView === 'combined' ? 
                     `<span class="view-indicator ${muscle.view}">${muscle.view}</span>` : '';
                 
                 // Determine which function to call for selection
                 const onClickHandler = activeListView === 'combined' ? 
                     `selectMuscle('${muscle.view}', ${muscle.originalIndex})` :
                     `selectMuscle('${activeListView}', ${i})`;
                 
                 // Determine which function to call for deletion
                 const deleteHandler = activeListView === 'combined' ? 
                     `deleteMuscleFromCombined(event, '${muscle.view}', ${muscle.originalIndex})` :
                     `deleteMuscle(event, ${i})`;
                 
                 return `
                 <div class="muscle-item ${isSelected ? 'selected' : ''}" onclick="${onClickHandler}">
                     <div class="muscle-header">
                         <div>
                             <span class="color-preview" style="background:${muscle.color}"></span>
                             <strong>${muscle.name || 'Unnamed'}</strong>
                             ${viewIndicator}
                         </div>
                         <button class="btn-danger" style="width:auto; margin:0; padding:2px 8px; font-size:10px;" 
                                 onclick="${deleteHandler}">✕</button>
                     </div>
                     <div style="font-size:11px; color:#666; margin-left: 24px;">
                         ${muscle.regions ? muscle.regions.length : 0} regions
                     </div>
                 </div>
                 `;
             }).join('');
         }

         function selectMuscle(view, index) {
           selectedMuscle = { view, index };
             selectedRegionIndices = [];
           const muscle = muscles[view][index];
             
             // 1. Populate Edit Panel
             document.getElementById('editSection').style.display = 'block';
             document.getElementById('editColor').value = muscle.color || '#ff0000';
             
             // 2. Select Radio Button - must match both name AND view
             const radios = document.getElementsByName('muscle_selector');
             let found = false;
             for(const r of radios) {
                 if(r.value === muscle.name && r.getAttribute('data-view') === view) {
                     r.checked = true;
                     found = true;
                     r.parentElement.scrollIntoView({ block: 'nearest' });
                 } else {
                     r.checked = false;
                 }
             }
             if(!found) {
                 radios.forEach(r => r.checked = false);
             }
         
             // 3. Update UI
             updateListUI();
             
             // 4. Redraw canvases (to show selection highlight)
             drawCanvas('front');
             drawCanvas('back');
         }
         
         function deleteMuscle(e, index) {
             e.stopPropagation();
             if(!confirm("Delete this muscle group?")) return;
             
             muscles[activeListView].splice(index, 1);
             if(selectedMuscle && selectedMuscle.view === activeListView && selectedMuscle.index === index) {
                 cancelEdit();
             }
             updateListUI();
             drawCanvas('front');
             drawCanvas('back');
         }
         
         function deleteMuscleFromCombined(e, view, originalIndex) {
             e.stopPropagation();
             if(!confirm("Delete this muscle group?")) return;
             
             // Remove from the correct array
             muscles[view].splice(originalIndex, 1);
             
             // Clear selection if this was the selected muscle
             if(selectedMuscle && selectedMuscle.view === view && selectedMuscle.index === originalIndex) {
                 cancelEdit();
             }
             
             updateListUI();
             drawCanvas('front');
             drawCanvas('back');
         }
         
         function saveEdit() {
             if (!selectedMuscle) return;
         
             // Get Name
             const radio = document.querySelector('input[name="muscle_selector"]:checked');
             if (!radio) {
                 alert("Please select a Muscle Group from the list.");
                 return;
             }
         
             // Get current muscle
             const muscle = muscles[selectedMuscle.view][selectedMuscle.index];
             
             // Update name and color
             muscle.name = radio.value;
             muscle.color = document.getElementById('editColor').value;
             
             // Add newly selected regions to the muscle
             if (selectedRegionIndices.length > 0 && processedData[selectedMuscle.view]) {
                 const newRegions = selectedRegionIndices.map(idx => 
                     processedData[selectedMuscle.view].regions[idx]
                 );
                 
                 // Merge with existing regions
                 if (!muscle.regions) {
                     muscle.regions = [];
                 }
                 muscle.regions.push(...newRegions);
                 
                 console.log(`Added ${selectedRegionIndices.length} new regions to ${muscle.name}`);
             }
             
             // Clear selection
             selectedRegionIndices = [];
             selectedMuscle = null;
             
             // Clear radio button selection
             const radios = document.getElementsByName('muscle_selector');
             radios.forEach(r => r.checked = false);
         
             // Refresh
             updateListUI();
             drawCanvas('front');
             drawCanvas('back');
         }
         
         function cancelEdit() {
             selectedMuscle = null;
             selectedRegionIndices = [];
             
             // Clear radio button selection
             const radios = document.getElementsByName('muscle_selector');
             radios.forEach(r => r.checked = false);
             
             updateListUI();
             drawCanvas('front');
             drawCanvas('back');
         }
         
         function exportData() {
             if (!dataLoaded) return;
             
             const exportObj = {
                 front: muscles.front,
                 back: muscles.back,
                 meta: {
                     generated: new Date().toISOString()
                 }
             };
         
             const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportObj, null, 2));
             const downloadAnchorNode = document.createElement('a');
             downloadAnchorNode.setAttribute("href", dataStr);
             downloadAnchorNode.setAttribute("download", "muscle-diagram-data.json");
             document.body.appendChild(downloadAnchorNode);
             downloadAnchorNode.click();
             downloadAnchorNode.remove();
             
             alert("JSON exported successfully!");
         }
         
         // --- CANVAS CLICK HANDLERS ---
         
         document.getElementById('canvas-front').addEventListener('click', handleCanvasClick);
         document.getElementById('canvas-back').addEventListener('click', handleCanvasClick);
         
         function handleCanvasClick(e) {
             // Only allow clicking if a muscle is selected for editing
             if (!selectedMuscle) {
                 alert('Please select a muscle from the list first!');
                 return;
             }
             
             // Determine which view this canvas belongs to
             const clickedView = e.target.id === 'canvas-front' ? 'front' : 'back';
             
             // IMPORTANT: Only allow clicking on the same view as the selected muscle
             if (clickedView !== selectedMuscle.view) {
                 alert(`This muscle is on the ${selectedMuscle.view} view. Please click the ${selectedMuscle.view} canvas.`);
                 return;
             }
             
             const processed = processedData[clickedView];
             if (!processed || !processed.regions) {
                 alert('No regions detected. The image may need to be reprocessed.');
                 return;
             }
             
             // Get click coordinates
             const rect = e.target.getBoundingClientRect();
             const scaleX = e.target.width / rect.width;
             const scaleY = e.target.height / rect.height;
             const x = Math.floor((e.clientX - rect.left) * scaleX);
             const y = Math.floor((e.clientY - rect.top) * scaleY);
             
             // Find which region was clicked
             for (let i = 0; i < processed.regions.length; i++) {
                 const region = processed.regions[i];
                 if (region && region.some(point => 
                     Math.abs(point.x - x) <= 2 && Math.abs(point.y - y) <= 2
                 )) {
                     // Toggle region selection
                     const idx = selectedRegionIndices.indexOf(i);
                     if (idx > -1) {
                         selectedRegionIndices.splice(idx, 1);
                     } else {
                         selectedRegionIndices.push(i);
                     }
                     drawCanvas(clickedView);
                     return;
                 }
             }
         }
         // Kick off image loading immediately on page load
         autoInit();
      </script>
   </body>
</html>
